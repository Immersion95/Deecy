name: Publish Binaries

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest]
        cpu: [x86_64, x86_64_v2, x86_64_v3, x86_64_v4]
        include:
          - os: windows-latest
            artifact_suffix: windows
          - os: ubuntu-latest
            artifact_suffix: linux

    runs-on: ${{ matrix.os }}

    env:
      # Pinned SDL3 version used by the Windows CI job. The matching dev
      # archive is fetched from libsdl-org/SDL releases below. Bumping this
      # also requires bumping the SDL3 runtime DLL shipped in the artifact.
      SDL3_VERSION: 3.4.4

    steps:
      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        shell: bash
        run: |
          sudo apt update
          sudo apt -y install libgtk-3-dev libudev-dev cmake ninja-build build-essential pkg-config

      - uses: actions/checkout@v4
        with:
          submodules: 'true'
          lfs: 'true'

      - name: Install SDL3 (Linux)
        if: runner.os == 'Linux'
        shell: bash
        env:
          SDL3_VERSION: ${{ env.SDL3_VERSION }}
        run: |
          SDL3_PREFIX="$RUNNER_TEMP/sdl3"
          curl -L "https://github.com/libsdl-org/SDL/releases/download/release-${SDL3_VERSION}/SDL3-${SDL3_VERSION}.tar.gz" -o /tmp/SDL3.tar.gz
          tar -xzf /tmp/SDL3.tar.gz -C /tmp
          cmake -S "/tmp/SDL3-${SDL3_VERSION}" -B /tmp/SDL3-build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX="$SDL3_PREFIX" \
            -DSDL_SHARED=ON \
            -DSDL_STATIC=OFF
          cmake --build /tmp/SDL3-build
          cmake --install /tmp/SDL3-build
          echo "SDL3_PATH=$SDL3_PREFIX" >> "$GITHUB_ENV"
          echo "PKG_CONFIG_PATH=$SDL3_PREFIX/lib/pkgconfig:${PKG_CONFIG_PATH:-}" >> "$GITHUB_ENV"
          echo "LD_LIBRARY_PATH=$SDL3_PREFIX/lib:${LD_LIBRARY_PATH:-}" >> "$GITHUB_ENV"
          echo "LIBRARY_PATH=$SDL3_PREFIX/lib:${LIBRARY_PATH:-}" >> "$GITHUB_ENV"
          echo "C_INCLUDE_PATH=$SDL3_PREFIX/include:${C_INCLUDE_PATH:-}" >> "$GITHUB_ENV"

      - name: Install SDL3 (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $version = $env:SDL3_VERSION
          $url = "https://github.com/libsdl-org/SDL/releases/download/release-$version/SDL3-devel-$version-mingw.tar.gz"
          $extractDir = "$env:RUNNER_TEMP\sdl3-extracted"
          New-Item -ItemType Directory -Force -Path $extractDir | Out-Null
          Invoke-WebRequest -Uri $url -OutFile "$env:RUNNER_TEMP\sdl3.tar.gz"
          tar -xzf "$env:RUNNER_TEMP\sdl3.tar.gz" -C $extractDir
          $candidate = Get-ChildItem -Path $extractDir -Directory -Recurse |
            Where-Object {
              (Test-Path (Join-Path $_.FullName "lib\libSDL3.dll.a")) -or
              (Test-Path (Join-Path $_.FullName "lib\SDL3.dll.a")) -or
              (Test-Path (Join-Path $_.FullName "lib\libSDL3.a"))
            } |
            Select-Object -First 1
          if (-not $candidate) {
            throw "Could not locate SDL3 MinGW root under $extractDir"
          }
          "SDL3_PATH=$($candidate.FullName)" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Get zig version
        id: zigversion
        shell: bash
        run: echo "version=$(cat .zigversion)" >> $GITHUB_OUTPUT

      - name: Setup zig
        uses: mlugg/setup-zig@v2
        with:
          version: ${{ steps.zigversion.outputs.version }}

      - name: Compile Deecy
        shell: bash
        run: |
          if [ "${{ runner.os }}" == "Windows" ]; then
            zig build --release=fast -Dcpu=${{ matrix.cpu }} -Dsdl3-path="$SDL3_PATH"
          else
            zig build --release=fast -Dcpu=${{ matrix.cpu }} -Dsdl3-path="$SDL3_PATH"
          fi

      - name: Prepare Artifacts
        shell: bash
        run: |
          mkdir -p Deecy/data
          printf "Copy dc_boot.bin and dc_flash.bin in ./data.\nWebsite: https://github.com/Senryoku/Deecy" > Deecy/README.txt
          printf "Copy dc_boot.bin and dc_flash.bin here." > Deecy/data/README.txt

          if [ "${{ runner.os }}" == "Windows" ]; then
            cp zig-out/bin/dxcompiler.dll Deecy/
            cp zig-out/bin/dxil.dll Deecy/
            cp zig-out/bin/Deecy.exe Deecy/
            cp zig-out/bin/Deecy.com Deecy/
            cp "$SDL3_PATH/bin/SDL3.dll" Deecy/
          else
            cp zig-out/bin/Deecy Deecy/
          fi

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Deecy-${{ matrix.cpu }}-${{ matrix.artifact_suffix }}
          path: Deecy/
